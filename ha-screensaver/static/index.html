<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Assistant Screensaver</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #ha-iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        #slideshow {
            position: fixed;
            inset: 0;
            background: #000;
            display: none;
            z-index: 1000;
        }

        #slideshow.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide.active {
            opacity: 1;
        }

        .slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        #screensaver-clock {
            position: absolute;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            z-index: 1001;
            transition: color 0.3s ease, text-shadow 0.3s ease;
            pointer-events: none;
            text-align: center;
        }

        /* Clock position variants */
        #screensaver-clock.pos-bottom-center { bottom: 40px; left: 50%; transform: translateX(-50%); }
        #screensaver-clock.pos-top-center { top: 40px; left: 50%; transform: translateX(-50%); }
        #screensaver-clock.pos-top-left { top: 40px; left: 40px; text-align: left; }
        #screensaver-clock.pos-top-right { top: 40px; right: 40px; text-align: right; }
        #screensaver-clock.pos-bottom-left { bottom: 40px; left: 40px; text-align: left; }
        #screensaver-clock.pos-bottom-right { bottom: 40px; right: 40px; text-align: right; }

        /* When media mode is active, push the clock up to make room for volume slider */
        #screensaver-clock.media-active { bottom: 100px; }

        #clock-time {
            font-size: 72px;
            font-weight: 600;
            letter-spacing: 2px;
            line-height: 1;
            margin-bottom: 8px;
        }

        #clock-date {
            font-size: 24px;
            font-weight: 400;
            letter-spacing: 1px;
            opacity: 0.9;
            line-height: 1.2;
        }

        #photo-info {
            position: absolute;
            top: 30px;
            left: 30px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 18px;
            font-weight: 400;
            color: white;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 0, 0, 0.4);
            z-index: 1001;
            pointer-events: none;
            line-height: 1.6;
        }

        #screensaver-clock.white {
            color: white;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 0, 0, 0.4);
        }

        #screensaver-clock.black {
            color: black;
            text-shadow: 0 1px 4px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 255, 255, 0.4);
        }

        /* Now Playing overlay */
        #now-playing {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 999;
            background: #111;
            overflow: hidden;
        }

        #now-playing.active {
            display: flex;
            /* Offset upward to leave room for clock + volume bar at bottom */
            padding-bottom: 200px;
        }

        #now-playing-bg {
            position: absolute;
            width: 110%;
            height: 110%;
            top: -5%;
            left: -5%;
            background-size: cover;
            background-position: center;
            filter: blur(40px) brightness(0.3);
        }

        #now-playing-art {
            width: 280px;
            height: 280px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        #now-playing-info {
            z-index: 1;
            text-align: center;
            color: white;
            margin-top: 28px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #now-playing-title {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        #now-playing-artist {
            font-size: 20px;
            font-weight: 400;
            opacity: 0.8;
            margin-top: 8px;
        }

        #now-playing-album {
            font-size: 16px;
            font-weight: 300;
            opacity: 0.5;
            margin-top: 4px;
        }

        /* Media transport controls (top center) */
        #media-controls-transport {
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1002;
            display: none;
            align-items: center;
            gap: 24px;
        }

        #media-controls-transport.active {
            display: flex;
        }

        #media-controls-transport button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 10px;
            line-height: 0;
            opacity: 0.85;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #media-controls-transport button:hover {
            opacity: 1;
        }

        #media-controls-transport button svg {
            width: 36px;
            height: 36px;
            filter: drop-shadow(0 1px 3px rgba(0, 0, 0, 0.6));
        }

        #media-controls-transport button.play-pause svg {
            width: 48px;
            height: 48px;
        }

        /* Volume slider (bottom bar) */
        #media-controls-volume {
            position: absolute;
            bottom: 24px;
            left: 5%;
            width: 90%;
            height: 50px;
            z-index: 1002;
            display: none;
            align-items: center;
            gap: 14px;
        }

        #media-controls-volume.active {
            display: flex;
        }

        #media-controls-volume .vol-icon {
            color: white;
            flex-shrink: 0;
            user-select: none;
            display: flex;
            align-items: center;
            opacity: 0.7;
        }

        #media-controls-volume .vol-icon svg {
            width: 24px;
            height: 24px;
            filter: drop-shadow(0 1px 3px rgba(0, 0, 0, 0.6));
        }

        #volume-slider {
            -webkit-appearance: none;
            appearance: none;
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.25);
            outline: none;
            cursor: pointer;
        }

        #volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            cursor: pointer;
        }

        #volume-slider::-moz-range-thumb {
            width: 24px;
            height: 24px;
            border: none;
            border-radius: 50%;
            background: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            cursor: pointer;
        }

        #volume-slider::-moz-range-track {
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.25);
        }

        #weather-info {
            position: absolute;
            top: 30px;
            right: 30px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 28px;
            font-weight: 500;
            color: white;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 0, 0, 0.4);
            z-index: 1001;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #weather-info svg {
            width: 32px;
            height: 32px;
            filter: drop-shadow(0 1px 3px rgba(0, 0, 0, 0.6));
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <iframe id="ha-iframe" name="ha-main-window" src="" allow="microphone; camera; geolocation"></iframe>

    <div id="slideshow">
        <!-- Slides will be dynamically added here -->
        <div id="screensaver-clock">
            <div id="clock-time"></div>
            <div id="clock-date"></div>
        </div>
        <div id="photo-info">
            <div id="photo-date"></div>
            <div id="photo-location"></div>
        </div>
        <div id="now-playing">
            <div id="now-playing-bg"></div>
            <img id="now-playing-art" src="" alt="Album art">
            <div id="now-playing-info">
                <div id="now-playing-title"></div>
                <div id="now-playing-artist"></div>
                <div id="now-playing-album"></div>
            </div>
        </div>
        <div id="media-controls-transport">
            <button id="btn-prev" title="Previous">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M9.195 18.44c1.25.714 2.805-.189 2.805-1.629v-2.34l6.945 3.968c1.25.715 2.805-.188 2.805-1.628V7.19c0-1.44-1.555-2.343-2.805-1.628L12 9.53v-2.34c0-1.44-1.555-2.343-2.805-1.628l-7.108 4.061c-1.26.72-1.26 2.536 0 3.256l7.108 4.061Z"/></svg>
            </button>
            <button id="btn-play-pause" class="play-pause" title="Play/Pause">
                <svg id="icon-pause" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M6.75 5.25a.75.75 0 0 1 .75-.75H9a.75.75 0 0 1 .75.75v13.5a.75.75 0 0 1-.75.75H7.5a.75.75 0 0 1-.75-.75V5.25Zm7.5 0A.75.75 0 0 1 15 4.5h1.5a.75.75 0 0 1 .75.75v13.5a.75.75 0 0 1-.75.75H15a.75.75 0 0 1-.75-.75V5.25Z" clip-rule="evenodd"/></svg>
                <svg id="icon-play" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path fill-rule="evenodd" d="M4.5 5.653c0-1.427 1.529-2.33 2.779-1.643l11.54 6.347c1.295.712 1.295 2.573 0 3.286L7.28 19.99c-1.25.687-2.779-.217-2.779-1.643V5.653Z" clip-rule="evenodd"/></svg>
            </button>
            <button id="btn-next" title="Next">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M5.055 7.06C3.805 6.347 2.25 7.25 2.25 8.69v6.62c0 1.44 1.555 2.343 2.805 1.628L12 12.97v2.34c0 1.44 1.555 2.343 2.805 1.628l7.108-4.061c1.26-.72 1.26-2.536 0-3.256l-7.108-4.06C13.555 4.715 12 5.617 12 7.058v2.34L5.055 7.06Z"/></svg>
            </button>
        </div>
        <div id="media-controls-volume">
            <span class="vol-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M13.5 4.06c0-1.336-1.616-2.005-2.56-1.06l-4.5 4.5H4.508c-1.141 0-2.318.664-2.66 1.905A9.76 9.76 0 0 0 1.5 12c0 .898.121 1.768.35 2.595.341 1.24 1.518 1.905 2.659 1.905h1.93l4.5 4.5c.945.945 2.561.276 2.561-1.06V4.06Z"/></svg>
            </span>
            <input type="range" id="volume-slider" min="0" max="100" value="50">
            <span class="vol-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M13.5 4.06c0-1.336-1.616-2.005-2.56-1.06l-4.5 4.5H4.508c-1.141 0-2.318.664-2.66 1.905A9.76 9.76 0 0 0 1.5 12c0 .898.121 1.768.35 2.595.341 1.24 1.518 1.905 2.659 1.905h1.93l4.5 4.5c.945.945 2.561.276 2.561-1.06V4.06ZM18.584 5.106a.75.75 0 0 1 1.06 0c3.808 3.807 3.808 9.98 0 13.788a.75.75 0 0 1-1.06-1.06 8.25 8.25 0 0 0 0-11.668.75.75 0 0 1 0-1.06Z"/><path d="M15.932 7.757a.75.75 0 0 1 1.061 0 6 6 0 0 1 0 8.486.75.75 0 0 1-1.06-1.061 4.5 4.5 0 0 0 0-6.364.75.75 0 0 1 0-1.06Z"/></svg>
            </span>
        </div>
        <div id="weather-info"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
